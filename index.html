<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>赶马入圈 - 抖音小游戏</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Noto Sans SC', "Microsoft YaHei", sans-serif;
      background: #8BC34A;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      overflow: hidden;
    }
    .header {
      width: 100%;
      max-width: 500px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 20px;
      background: rgba(255,255,255,0.9);
      border-radius: 20px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      margin-bottom: 20px;
    }
    .title { font-size: 28px; font-weight: bold; color: #333; }
    .level { font-size: 18px; color: #666; }
    .game-container {
      position: relative;
      width: 100%;
      max-width: 500px;
      aspect-ratio: 3 / 4;
      background: linear-gradient(135deg, #4CAF50 0%, #8BC34A 50%, #CDDC39 100%);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 10px 40px rgba(0,0,0,0.3);
    }
    .game-canvas {
      width: 100%;
      height: 100%;
      display: block;
    }
    .footer {
      margin-top: 20px;
      display: flex;
      gap: 15px;
    }
    .btn {
      padding: 15px 40px;
      font-size: 18px;
      font-weight: bold;
      color: white;
      background: linear-gradient(135deg, #FF9800, #FF5722);
      border: none;
      border-radius: 30px;
      cursor: pointer;
      box-shadow: 0 5px 20px rgba(255,152,0,0.4);
    }
    .victory-overlay, .fail-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.8);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .victory-overlay.show, .fail-overlay.show {
      display: flex;
    }
    .victory-text {
      font-size: 60px;
      color: #FFD700;
      text-shadow: 0 0 30px rgba(255,215,0,0.8);
    }
    .fail-text { font-size: 48px; color: #FF5722; }
    .victory-sub { font-size: 24px; color: white; margin-top: 20px; }
    .victory-actions { margin-top: 30px; display: flex; gap: 15px; }
  </style>
</head>
<body>
  <div class="header">
    <div class="title">🐴 赶马入圈</div>
    <div class="level">第 <span id="level">1</span> 关</div>
  </div>
  <div class="game-container">
    <canvas id="gameCanvas" class="game-canvas"></canvas>
    <div class="victory-overlay" id="victoryOverlay">
      <div class="victory-text">🎉 胜利!</div>
      <div class="victory-sub">恭喜通关第 <span id="victoryLevel">1</span> 关!</div>
      <div class="victory-actions">
        <button class="btn" id="shareBtn">📤 分享</button>
        <button class="btn" id="nextLevelBtn">下一关 ▶</button>
      </div>
    </div>
    <div class="fail-overlay" id="failOverlay">
      <div class="fail-text">⏰ 时间到!</div>
      <div class="victory-sub">第 <span id="failLevel">1</span> 关挑战失败</div>
      <div class="victory-actions">
        <button class="btn" id="retryBtn">🔄 再试一次</button>
      </div>
    </div>
  </div>
  <div class="footer">
    <button class="btn" id="restartBtn">🔄 重新开始</button>
  </div>
  <script src="game.js"></script>
</body>
</html>
