<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>赶马入圈 - 抖音小游戏</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Noto Sans SC', "Microsoft YaHei", sans-serif;
      background: url('./assets/grassland_bg.png') center/cover no-repeat
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }
    .header {
      width: 100%;
      max-width: 500px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 20px;
      background: rgba(255,255,255,0.9);
      border-radius: 20px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      margin-bottom: 20px;
    }
    .title {
      font-size: 24px;
      font-weight: bold;
      background: linear-gradient(135deg, #FF9800, #FF7043);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .stats { display: flex; gap: 15px; }
    .stat-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 8px 15px;
      background: linear-gradient(135deg, #E8F5E9, #C8E6C9);
      border-radius: 12px;
    }
    .stat-label { font-size: 12px; color: #666; }
    .stat-value { font-size: 18px; font-weight: bold; color: #4CAF50; }
    .game-container { position: relative; z-index: 1;
      background: rgba(255,255,255,0.95);
      border-radius: 24px;
      padding: 20px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.15);
      position: relative;
    }
    
    /* 新手引导遮罩 */
    .guide-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.7);
      z-index: 1000;
      display: none;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }
    .guide-overlay.active { display: flex; }
    .guide-content {
      background: white;
      padding: 30px;
      border-radius: 20px;
      text-align: center;
      max-width: 300px;
    }
    .guide-title { font-size: 20px; font-weight: bold; color: #FF9800; margin-bottom: 15px; }
    .guide-text { font-size: 16px; color: #333; margin-bottom: 20px; line-height: 1.6; }
    .guide-arrow {
      font-size: 40px;
      animation: bounce 1s infinite;
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    .guide-progress { display: flex; gap: 8px; margin-bottom: 20px; }
    .guide-dot { width: 10px; height: 10px; border-radius: 50%; background: #ddd; }
    .guide-dot.active { background: #FF9800; }
    canvas { display: block; border-radius: 16px; }
    .controls {
      display: flex;
      gap: 12px;
      margin-top: 20px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .btn {
      padding: 12px 28px;
      font-size: 16px;
      border: none;
      border-radius: 25px;
      cursor: pointer;
      transition: all 0.3s;
      font-weight: bold;
      font-family: inherit;
    }
    .btn:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0,0,0,0.2); }
    .btn-primary { background: linear-gradient(135deg, #FF9800, #FF7043); color: white; }
    .btn-secondary { background: linear-gradient(135deg, #66BB6A, #43A047); color: white; }
    .level-select {
      margin-top: 20px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 400px;
      padding: 15px;
      background: rgba(255,255,255,0.8);
      border-radius: 16px;
    }
    .level-btn {
      width: 45px;
      height: 45px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #E8F5E9, #C8E6C9);
      color: #4CAF50;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s;
      font-size: 16px;
      font-family: inherit;
    }
    .level-btn:hover { transform: scale(1.1); }
    .level-btn.active {
      background: linear-gradient(135deg, #4CAF50, #388E3C);
      color: white;
      transform: scale(1.1);
    }
    .modal {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.6);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }
    .modal.show { display: flex; }
    .modal-content {
      background: linear-gradient(135deg, #fff, #f5f5f5);
      padding: 40px;
      border-radius: 24px;
      text-align: center;
      border: 4px solid #4CAF50;
      animation: popIn 0.4s ease;
      max-width: 90%;
    }
    @keyframes popIn {
      from { transform: scale(0.3); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
    .modal-title { font-size: 28px; color: #4CAF50; margin-bottom: 16px; font-weight: bold; }
    .modal-stats { font-size: 16px; color: #666; margin-bottom: 24px; }
    .modal-buttons { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    .help-content { text-align: left; max-height: 60vh; overflow-y: auto; }
    .help-item { display: flex; align-items: center; margin: 12px 0; padding: 12px; background: #E8F5E9; border-radius: 12px; }
    .help-icon {
      width: 40px; height: 40px;
      background: #4CAF50;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 20px;
      margin-right: 12px;
      flex-shrink: 0;
    }
    .help-text { font-size: 14px; color: #333; }
    @media (max-width: 500px) {
      .header { flex-direction: column; gap: 10px; }
      .btn { padding: 10px 20px; font-size: 14px; }
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="title">🐴 赶马入圈</div>
    <div class="stats">
      <div class="stat-item"><span class="stat-label">关卡</span><span class="stat-value" id="levelNum">1</span></div>
      <div class="stat-item"><span class="stat-label">步数</span><span class="stat-value" id="moveCount">0</span></div>
      <div class="stat-item"><span class="stat-label">目标</span><span class="stat-value" id="targetCount">0/1</span></div>
    </div>
  </div>
  <div class="game-container"><canvas id="gameCanvas"></canvas></div>
  <div class="controls">
    <button class="btn btn-secondary" onclick="showHelp()">📖 玩法</button>
    <button class="btn btn-secondary" onclick="game.resetLevel()">🔄 重置</button>
  </div>
  <div class="level-select" id="levelSelect"></div>
  <div class="modal" id="winModal">
    <div class="modal-content">
      <div class="modal-title">🎉 通关成功！</div>
      <div class="modal-stats" id="winStats">步数: 0 | 用时: 0秒</div>
      <div class="modal-buttons">
        <button class="btn btn-secondary" onclick="game.nextLevel()">下一关 ➡️</button>
        <button class="btn btn-primary" onclick="game.replayLevel()">🔄 重玩</button>
      </div>
    </div>
  </div>
  <div class="modal" id="helpModal">
    <div class="modal-content">
      <div class="modal-title">📖 玩法说明</div>
      <div class="help-content">
        <div class="help-item"><div class="help-icon">🐴</div><div class="help-text">马有朝向（↑↓←→），点击马选择方向</div></div>
        <div class="help-item"><div class="help-icon">⬆️</div><div class="help-text">点击马的朝向箭头改变方向</div></div>
        <div class="help-item"><div class="help-icon">� straw</div><div class="help-text">点击干草堆，马会前进一格</div></div>
        <div class="help-item"><div class="help-icon">🏠</div><div class="help-text">把所有马赶进马圈即可通关</div></div>
      </div>
      <div class="modal-buttons" style="margin-top:20px">
        <button class="btn btn-primary" onclick="closeHelp()">知道了</button>
      </div>
    </div>
  </div>

    // 绘制马的函数
    function drawHorse(ctx, x, y, size, direction, selected) {
      // 选中光晕
      if (selected) {
        ctx.fillStyle = 'rgba(255, 152, 0, 0.4)';
        ctx.beginPath();
        ctx.arc(x + size/2, y + size/2, size*0.45, 0, Math.PI*2);
        ctx.fill();
      }
      // 绘制马图片
      ctx.drawImage(horseImages[direction], x + 5, y + 5, size - 10, size - 10);
    }

    // 绘制干草堆
    function drawHay(ctx, x, y, size) {
      ctx.drawImage(hayImg, x + 10, y + 10, size - 20, size - 20);
    }

    // 绘制干草堆
    function drawHay(ctx, x, y, size) {
      const cx = x + size/2;
      const cy = y + size/2;
      
      // 干草堆底色
      ctx.fillStyle = '#FFD54F';
      ctx.beginPath();
      ctx.ellipse(cx, cy + 5, size * 0.4, size * 0.25, 0, 0, Math.PI * 2);
      ctx.fill();
      
      // 稻草纹理
      ctx.strokeStyle = '#FFA000';
      ctx.lineWidth = 2;
      for (let i = 0; i < 5; i++) {
        ctx.beginPath();
        const angle = (i / 5) * Math.PI - Math.PI/2;
        ctx.moveTo(cx, cy);
        ctx.lineTo(cx + Math.cos(angle) * size * 0.35, cy + Math.sin(angle) * size * 0.25);
        ctx.stroke();
      }
      
      // 绳子
      ctx.strokeStyle = '#8D6E63';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.ellipse(cx, cy, size * 0.3, size * 0.15, 0, 0, Math.PI * 2);
      ctx.stroke();
    }

      loadLevel(levelNum) {
        const level = this.levels.find(l => l.id === levelNum);

      }

      setupCanvas() {
        // 游戏区域 + 外部的马圈区域
        const gridSize = this.levelData.gridSize;
        const pen = this.levelData.pen;
        const maxGrid = Math.max(gridSize, pen.x + 1, pen.y + 1);
        const size = maxGrid * this.cellSize + (maxGrid + 1) * 8;
        this.canvas.width = size + this.padding * 2;
        this.canvas.height = size + this.padding * 2;
        this.canvas.style.width = Math.min(size + this.padding * 2, 420) + 'px';
        this.canvas.style.height = Math.min(size + this.padding * 2, 420) + 'px';
      }

      setupEvents() {
        this.canvas.addEventListener('click', (e) => this.handleClick(e));
        const levelSelect = document.getElementById('levelSelect');
        levelSelect.innerHTML = '';
        for (let i = 1; i <= this.levels.length; i++) {
          const btn = document.createElement('button');
          btn.className = 'level-btn' + (i === this.currentLevel ? ' active' : '') + (i > this.maxUnlockedLevel ? ' locked' : '');
          btn.textContent = i;
          btn.onclick = () => i <= this.maxUnlockedLevel && this.loadLevel(i);
          levelSelect.appendChild(btn);
        }
      }

      updateLevelButtons() {
        document.querySelectorAll('.level-btn').forEach((btn, idx) => {
          const level = idx + 1;
          btn.className = 'level-btn' + (level === this.currentLevel ? ' active' : '') + (level > this.maxUnlockedLevel ? ' locked' : '');
        });
      }

      updateStats() {
        document.getElementById('levelNum').textContent = this.currentLevel;
        document.getElementById('moveCount').textContent = this.moveCount;
        const inPen = this.horses.filter(h => h.inPen).length;
        document.getElementById('targetCount').textContent = inPen + '/' + this.horses.length;
      }

      handleClick(e) {
        const rect = this.canvas.getBoundingClientRect();
        const scaleX = this.canvas.width / rect.width;
        const scaleY = this.canvas.height / rect.height;
        const x = (e.clientX - rect.left) * scaleX;
        const y = (e.clientY - rect.top) * scaleY;
        const gridX = Math.floor((x - this.padding) / (this.cellSize + 8));
        const gridY = Math.floor((y - this.padding) / (this.cellSize + 8));

        // 点击了马 - 选中/切换方向
        playGameSound('select');
            const clickedHorse = this.horses.find(h => h.x === gridX && h.y === gridY && !h.inPen);
        if (clickedHorse) {
          // 点击马：马沿当前方向自动行走一步
          if (this.canMoveForward(clickedHorse)) {
            this.moveHorseForward(clickedHorse);
          } else {
            // 如果走不了，选择这匹马
            this.selectedHorse = clickedHorse.id;
          }
          this.render();
          return;
        }

        // 点击了干草 - 吸引马过来（马向草堆方向走）
        const clickedHay = this.hay.find(h => h.x === gridX && h.y === gridY);
        if (clickedHay && this.selectedHorse) {
          const horse = this.horses.find(h => h.id === this.selectedHorse);
          if (horse) {
            // 马向草堆方向移动
            this.moveHorseTowardHay(horse, gridX, gridY);
          }
          return;
        }

        // 点击空地取消选择
        this.selectedHorse = null;
        this.render();
      }

      canMoveForward(horse) {
        const dir = horse.dir;
        let newX = horse.x, newY = horse.y;
        if (dir === 'up') newY--;
        else if (dir === 'down') newY++;
        else if (dir === 'left') newX--;
        else if (dir === 'right') newX++;

        if (newX < 0 || newX >= this.levelData.gridSize || newY < 0 || newY >= this.levelData.gridSize) return false;
        if (this.walls.some(w => w.x === newX && w.y === newY)) return false;
        if (this.horses.some(h => h.x === newX && h.y === newY && !h.inPen)) return false;
        return true;
      }

      moveHorseForward(horse) {
        const dir = horse.dir;
        if (dir === 'up') horse.y--;
        else if (dir === 'down') horse.y++;
        else if (dir === 'left') horse.x--;
        else if (dir === 'right') horse.x++;
        
        this.moveCount++;
        this.checkWin();
        this.updateStats();
        this.render();
      }

      // 马向草堆方向移动
      moveHorseTowardHay(horse, hayX, hayY) {
        // 计算方向
        let newX = horse.x;
        let newY = horse.y;
        
        if (hayX > horse.x) newX++;
        else if (hayX < horse.x) newX--;
        else if (hayY > horse.y) newY++;
        else if (hayY < horse.y) newY--;
        
        // 检查是否可以移动
        if (newX < 0 || newX >= this.levelData.gridSize || newY < 0 || newY >= this.levelData.gridSize) return;
        if (this.walls.some(w => w.x === newX && w.y === newY)) return;
        if (this.horses.some(h => h.x === newX && h.y === newY && !h.inPen)) return;
        
        // 移动马
        horse.x = newX;
        horse.y = newY;
        
        this.moveCount++;
        this.checkWin();
        this.updateStats();
        this.render();
      }

      checkWin() {
        this.horses.forEach(horse => {
          const inPen = this.pens.some(p => p.x === horse.x && p.y === horse.y);
          horse.inPen = inPen;
        });
        if (this.horses.every(h => h.inPen)) {
          this.showWinModal();
        }
      }

      showWinModal() {
        const time = Math.floor((Date.now() - this.startTime) / 1000);
        document.getElementById('winStats').textContent = '步数: ' + this.moveCount + ' | 用时: ' + time + '秒';
        document.getElementById('winModal').classList.add('show');
      }

      nextLevel() {
        document.getElementById('winModal').classList.remove('show');
        if (this.currentLevel < this.levels.length) this.loadLevel(this.currentLevel + 1);
        else alert('恭喜通关全部关卡！🎉');
      }

      replayLevel() {
        document.getElementById('winModal').classList.remove('show');
        this.loadLevel(this.currentLevel);
      }

      resetLevel() { this.loadLevel(this.currentLevel); }

      render() {
        const ctx = this.ctx;
        const cellSize = this.cellSize;
        const padding = this.padding;
        const gridSize = this.levelData.gridSize;
        
        ctx.fillStyle = '#E8F5E9';
        ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);

        // 棋盘格
        for (let y = 0; y < gridSize; y++) {
          for (let x = 0; x < gridSize; x++) {
            const px = padding + x * (cellSize + 8);
            const py = padding + y * (cellSize + 8);
            ctx.fillStyle = (x + y) % 2 === 0 ? '#C8E6C9' : '#A5D6A7';
            ctx.beginPath();
            ctx.roundRect(px, py, cellSize, cellSize, 8);
            ctx.fill();
          }
        }

        // 墙壁
        this.walls.forEach(wall => {
          const px = padding + wall.x * (cellSize + 8);
          const py = padding + wall.y * (cellSize + 8);
          ctx.fillStyle = '#8D6E63';
          ctx.beginPath();
          ctx.roundRect(px + 4, py + 4, cellSize - 8, cellSize - 8, 6);
          ctx.fill();
        });

        // 马圈
        this.pens.forEach(pen => {
          const px = padding + pen.x * (cellSize + 8);
          const py = padding + pen.y * (cellSize + 8);
          ctx.fillStyle = 'rgba(141, 110, 99, 0.3)';
          ctx.beginPath();
          ctx.roundRect(px + 4, py + 4, cellSize - 8, cellSize - 8, 8);
          ctx.fill();
          ctx.strokeStyle = '#8D6E63';
          ctx.lineWidth = 3;
          for (let i = 0; i <= 3; i++) {
            ctx.beginPath();
            ctx.moveTo(px + 4 + i * (cellSize - 8) / 3, py + 4);
            ctx.lineTo(px + 4 + i * (cellSize - 8) / 3, py + cellSize - 4);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(px + 4, py + 4 + i * (cellSize - 8) / 3);
            ctx.lineTo(px + cellSize - 4, py + 4 + i * (cellSize - 8) / 3);
            ctx.stroke();
          }
        });

        // 干草堆
        this.hay.forEach(h => {
          const px = padding + h.x * (cellSize + 8);
          const py = padding + h.y * (cellSize + 8);
          drawHay(ctx, px, py, cellSize);
        });

        // 马
        this.horses.forEach(horse => {
          const px = padding + horse.x * (cellSize + 8);
          const py = padding + horse.y * (cellSize + 8);
          const selected = horse.id === this.selectedHorse;
          
          if (horse.inPen) {
            // 在马圈里显示房子
            ctx.font = '36px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('🏠', px + cellSize/2, py + cellSize/2);
          } else {
            drawHorse(ctx, px, py, cellSize, horse.dir, selected);
          }
        });
      }
    }

    // 游戏初始化完成后通过事件显示主菜单
    const game = new Game();
    
    // 隐藏游戏界面，等待用户点击开始
    document.querySelector('.game-container').style.display = 'none';
    
    // 页面加载完成后显示主菜单（延迟执行确保showMainMenu已定义）
    setTimeout(function() {
      if (typeof showMainMenu === 'function') {
        showMainMenu();
      }
    }, 100);
    
    function showHelp() { document.getElementById('helpModal').classList.add('show'); }
    function closeHelp() { document.getElementById('helpModal').classList.remove('show'); }
  </script>
</body>

<script>
// 新手引导系统
let guideStep = 0;
const guideSteps = [
  { title: "第一步：选马", text: "点击选中一匹马，马会显示选中框", arrow: "👆" },
  { title: "第二步：转向", text: "再次点击马匹，可以改变行走方向", arrow: "🔄" },

];

function startGuide() {

  guideStep = 0;
  showGuideStep();
}

function showGuideStep() {
  const overlay = document.getElementById('guideOverlay');
  const title = document.getElementById('guideTitle');
  const text = document.getElementById('guideText');
  const arrow = document.getElementById('guideArrow');
  const dots = document.querySelectorAll('.guide-dot');
  
  if (guideStep < guideSteps.length) {
    title.textContent = guideSteps[guideStep].title;
    text.textContent = guideSteps[guideStep].text;
    arrow.textContent = guideSteps[guideStep].arrow;
    overlay.classList.add('active');
    dots.forEach((dot, i) => {
      dot.classList.toggle('active', i <= guideStep);
    });
  } else {
    overlay.classList.remove('active');
    localStorage.setItem('guideCompleted', 'true');
  }
}

function nextGuideStep() {
  guideStep++;
  showGuideStep();
}

<script>
// 音效系统
const AudioSys = {
  ctx: null,
  init: function() {
    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
  },
  playTone: function(freq, duration, type = 'sine') {
    if (!this.ctx) this.init();
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(0.3, this.ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + duration);
    osc.connect(gain);
    gain.connect(this.ctx.destination);
    osc.start();
    osc.stop(this.ctx.currentTime + duration);
  },
  playSelect: function() { this.playTone(800, 0.1); },
  playMove: function() { this.playTone(400, 0.15); },
  playWin: function() { 
    this.playTone(523, 0.1);
    setTimeout(() => this.playTone(659, 0.1), 100);
    setTimeout(() => this.playTone(784, 0.2), 200);
  },
  playError: function() { this.playTone(200, 0.3, 'square'); }
};

// 游戏事件音效
function playGameSound(type) {
  try {
    switch(type) {
      case 'select': AudioSys.playSelect(); break;
      case 'move': AudioSys.playMove(); break;
      case 'win': AudioSys.playWin(); break;
      case 'error': AudioSys.playError(); break;
    }
  } catch(e) {}
}
</script>

  { id: 1, name: "草地", gridSize: 4, horses: 1, hay: 1, pen: {x:5,y:2}, obstacles: [], difficulty: 1 },

  { id: 3, name: "丛林", gridSize: 5, horses: 2, hay: 1, pen: {x:6,y:3}, obstacles: [{x:2,y:2},{x:3,y:3}], difficulty: 2 },
  { id: 4, name: "沼泽", gridSize: 5, horses: 2, hay: 2, pen: {x:6,y:3}, obstacles: [{x:1,y:1},{x:4,y:2}], difficulty: 2 },

  { id: 7, name: "沙漠", gridSize: 7, horses: 3, hay: 2, pen: {x:8,y:4}, obstacles: [{x:1,y:1},{x:3,y:3},{x:5,y:5},{x:2,y:6}], difficulty: 3 },
  { id: 8, name: "峡谷", gridSize: 7, horses: 3, hay: 3, pen: {x:0,y:4}, obstacles: [{x:2,y:2},{x:4,y:4},{x:6,y:6},{x:3,y:5}], difficulty: 3 },
  { id: 9, name: "森林", gridSize: 8, horses: 4, hay: 3, pen: {x:9,y:4}, obstacles: [{x:1,y:2},{x:3,y:1},{x:5,y:5},{x:7,y:3},{x:2,y:7}], difficulty: 4 },
  { id: 10, name: "迷宫", gridSize: 8, horses: 4, hay: 3, pen: {x:4,y:9}, obstacles: [{x:2,y:2},{x:2,y:3},{x:2,y:4},{x:6,y:4},{x:6,y:5},{x:6,y:6}], difficulty: 4 },
];

// 难度评分系统
function calculateStars(time, moves, difficulty) {
  const baseScore = 100 * difficulty;
  const timeBonus = Math.max(0, 50 - time);
  const moveBonus = Math.max(0, 30 - moves * 2);
  const total = baseScore + timeBonus + moveBonus;
  
  if (total >= 130) return 3;
  if (total >= 80) return 2;
  return 1;
}

// 关卡解锁系统
function unlockNextLevel(currentLevel) {
  const unlocked = parseInt(localStorage.getItem('unlockedLevel') || 1);
  if (currentLevel >= unlocked && currentLevel < extendedLevels.length) {
    localStorage.setItem('unlockedLevel', currentLevel + 1);
  }
}

// 获取已解锁关卡
function getUnlockedLevel() {
  return parseInt(localStorage.getItem('unlockedLevel') || 1);
}
</script>

<script>
// 视觉特效系统
const VFX = {
  // 入圈成功特效
  showPenEffect: function(x, y) {
    const effect = document.createElement('div');
    effect.style.cssText = `
      position: fixed;
      left: ${x}px;
      top: ${y}px;
      width: 50px;
      height: 50px;
      background: radial-gradient(circle, gold, transparent);
      border-radius: 50%;
      animation: vfx-pen 0.5s ease-out forwards;
      pointer-events: none;
      z-index: 100;
    `;
    document.body.appendChild(effect);
    setTimeout(() => effect.remove(), 500);
  },
  
  // 粒子效果
  showParticles: function(x, y, color = '#FFD700') {
    for (let i = 0; i < 8; i++) {
      const p = document.createElement('div');
      const angle = (i / 8) * Math.PI * 2;
      const dist = 30 + Math.random() * 20;
      p.style.cssText = `
        position: fixed;
        left: ${x}px;
        top: ${y}px;
        width: 8px;
        height: 8px;
        background: ${color};
        border-radius: 50%;
        pointer-events: none;
        z-index: 100;
      `;
      document.body.appendChild(p);
      p.animate([
        { transform: 'translate(0,0) scale(1)', opacity: 1 },
        { transform: `translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist}px) scale(0)`, opacity: 0 }
      ], { duration: 400, easing: 'ease-out' });
      setTimeout(() => p.remove(), 400);
    }
  },
  
  // 屏幕震动
  shake: function() {
    document.body.animate([
      { transform: 'translate(0)' },
      { transform: 'translate(-5px, 5px)' },
      { transform: 'translate(5px, -5px)' },
      { transform: 'translate(-5px, 5px)' },
      { transform: 'translate(0)' }
    ], { duration: 200 });
  }
};

// 添加CSS动画
const vfxStyle = document.createElement('style');
vfxStyle.textContent = `
  @keyframes vfx-pen {
    0% { transform: scale(0); opacity: 1; }
    50% { transform: scale(1.5); opacity: 0.8; }
    100% { transform: scale(2); opacity: 0; }
  }
`;
document.head.appendChild(vfxStyle);
</script>

<script>
let isPaused = false;
let soundEnabled = true;
let musicEnabled = true;

function togglePause() {
  isPaused = !isPaused;
  document.getElementById('pausePanel').style.display = isPaused ? 'flex' : 'none';
}
function resumeGame() {
  isPaused = false;
  document.getElementById('pausePanel').style.display = 'none';
}
function openSettings() {
  document.getElementById('settingsPanel').style.display = 'flex';
}
function closeSettings() {
  document.getElementById('settingsPanel').style.display = 'none';
}
function toggleSound(enabled) {
  soundEnabled = enabled;
  localStorage.setItem('soundEnabled', enabled);
}
function toggleMusic(enabled) {
  musicEnabled = enabled;
  localStorage.setItem('musicEnabled', enabled);
}
// 加载设置
soundEnabled = localStorage.getItem('soundEnabled') !== 'false';
musicEnabled = localStorage.getItem('musicEnabled') !== 'false';

// 页面加载完成后显示主菜单
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', showMainMenu);
} else {
  showMainMenu();
}
</script>
